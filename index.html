<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jaskier</title>
    <link rel="stylesheet" href="css/modern-normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/script.js"></script>
  </head>
  <body>
    <div class="layout">
      <header class="header">
        <h1 class="header__title">My Library</h1>
        <button class="header__add-book">New Book</button>
      </header>
      <main class="main">
        <div class="shelf">
          <div class="book">
            <div class="book__details">
              <span class="book__title">The Lord of the Rings</span>
              <span class="book__author">J.R.R. Tolkien</span>
              <span class="book__pages">1178 pages</span>
            </div>
            <div class="book__controls">
              <label class="book__status">
                <input type="checkbox" class="book__checkbox" />
                Read
              </label>
              <button class="book__remove">Remove</button>
            </div>
          </div>
          <div class="book">
            <div class="book__details">
              <span class="book__title">The Catcher in the Rye</span>
              <span class="book__author">J.D. Salinger</span>
              <span class="book__pages">234 pages</span>
            </div>
            <div class="book__controls">
              <label class="book__status">
                <input type="checkbox" class="book__checkbox" />
                Read
              </label>
              <button class="book__remove">Remove</button>
            </div>
          </div>
          <div class="book">
            <div class="book__details">
              <span class="book__title">The Great Gatsby</span>
              <span class="book__author">F. Scott Fitzgerald</span>
              <span class="book__pages">180 pages</span>
            </div>
            <div class="book__controls">
              <label class="book__status">
                <input type="checkbox" class="book__checkbox" />
                Read
              </label>
              <button class="book__remove">Remove</button>
            </div>
          </div>
        </div>
      </main>
      <footer class="footer">
        <p class="footer__credit">Created by dyegocouto</p>
        <a
          class="footer__link"
          href="https://github.com/dyegocouto"
          target="_blank"
        >
          <img
            class="footer__icon"
            src="img/github-mark.svg"
            alt="GitHub profile"
          />
        </a>
      </footer>
      <dialog class="modal">
        <form class="modal__form">
          <h2 class="modal__title">Add Book</h2>
          <div class="modal__fields">
            <label class="modal__field">
              <span class="modal__label">Title</span>
              <input
                class="modal__input"
                type="text"
                placeholder="The Lord of the Rings"
              />
            </label>
            <label class="modal__field">
              <span class="modal__label">Author</span>
              <input
                class="modal__input"
                type="text"
                placeholder="J.R.R Tolkien"
              />
            </label>
            <label class="modal__field">
              <span class="modal__label">Pages</span>
              <input class="modal__input" type="number" placeholder="1178" />
            </label>
          </div>
          <div class="modal__actions">
            <label class="modal__checkbox">
              <input type="checkbox" />
              Read
            </label>
            <button class="modal__submit">Add Book</button>
          </div>
        </form>
      </dialog>
    </div>
  </body>
</html>
