<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jaskier</title>
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/modern-normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/script.js"></script>
  </head>
  <body>
    <div class="layout">
      <header class="header">
        <h1 class="header__title">My Library</h1>
        <button class="header__add-book">New Book</button>
      </header>
      <main class="main">
        <div class="shelf"></div>
      </main>
      <footer class="footer">
        <p class="footer__credit">Created by dyegocouto</p>
        <a
          class="footer__link"
          href="https://github.com/dyegocouto"
          target="_blank"
        >
          <img
            class="footer__icon"
            src="img/github-mark.svg"
            alt="GitHub profile"
          />
        </a>
      </footer>
      <dialog class="modal">
        <form class="modal__form">
          <div class="modal__fields">
            <label class="modal__field">
              <span class="modal__label">Title</span>
              <input
                class="modal__input"
                type="text"
                placeholder="The Lord of the Rings"
              />
            </label>
            <label class="modal__field">
              <span class="modal__label">Author</span>
              <input
                class="modal__input"
                type="text"
                placeholder="J.R.R Tolkien"
              />
            </label>
            <label class="modal__field">
              <span class="modal__label">Pages</span>
              <input
                class="modal__input"
                type="number"
                placeholder="1178"
                min="1"
              />
            </label>
          </div>
          <div class="modal__actions">
            <label class="modal__checkbox">
              <input type="checkbox" />
              Read
            </label>
            <button type="submit" class="modal__submit">Add Book</button>
          </div>
        </form>
      </dialog>
    </div>
  </body>
</html>
