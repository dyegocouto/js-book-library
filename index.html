<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jaskier</title>
    <link rel="stylesheet" href="css/modern-normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/script.js"></script>
  </head>
  <body>
    <div class="page-container">
      <header class="header">
        <h1 class="header__title">My Library</h1>
        <button class="add-button">New Book</button>
      </header>
      <main class="main">
        <div class="book-shelf">
          <div class="book">
            <div class="book__info">
              <span class="book__title">Apple Trees</span>
              <span class="book__author">John McIntosh</span>
              <span class="book__pages">197 pages</span>
            </div>
            <div class="book__actions">
              <label class="book__status">
                Read
                <input type="checkbox" id="read" />
              </label>
              <button class="book__remove">Remove</button>
            </div>
          </div>
        </div>
      </main>
      <footer class="footer">
        <p>Created by dyegocouto</p>
        <a href="https://github.com/dyegocouto" target="_blank">
          <img
            class="footer-logo"
            src="img/github-mark.svg"
            alt="Github profile link"
          />
        </a>
      </footer>
    </div>
  </body>
</html>
